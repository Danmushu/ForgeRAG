# ============================================================
# ForgeRAG DEV config
#
# Zero-external-service setup for local development and demos.
#   - SQLite for metadata        (./storage/forgerag.db)
#   - ChromaDB for vectors       (./storage/chroma)
#   - Local filesystem for blobs (./storage/blobs)
#   - OpenAI text-embedding-3-small for embedding (needs OPENAI_API_KEY)
#   - OpenAI gpt-4o-mini for answer generation   (needs OPENAI_API_KEY)
#
# Copy to forgerag.yaml in repo root (or export FORGERAG_CONFIG
# to point here) and fire up:
#
#   export OPENAI_API_KEY=sk-...
#   export FORGERAG_CONFIG=./examples/forgerag.dev.yaml
#   python scripts/batch_ingest.py ./papers --embed
#   uvicorn api.app:app --reload
#
# Only the fields that differ from defaults are listed. Full schema
# is in config/*.py (each Pydantic model documents every field).
# ============================================================

parser:
  backends:
    pymupdf:
      enabled: true
    mineru:
      enabled: false               # flip to true once MinerU is installed
      backend: pipeline            # or hybrid-auto-engine (3.0 default)
      device: cuda
  chunker:
    target_tokens: 600
    max_tokens: 1000

storage:
  mode: local
  local:
    root: ./storage/blobs
    # public_base_url: http://localhost:8000/static  # uncomment if you serve /static via nginx

files:
  max_bytes: 209715200             # 200 MiB cap during dev

persistence:
  relational:
    backend: sqlite
    sqlite:
      path: ./storage/forgerag.db
      journal_mode: wal
  vector:
    backend: chromadb
    chromadb:
      mode: persistent
      persist_directory: ./storage/chroma
      collection_name: forgerag_dev
      dimension: 1536
      distance: cosine

embedder:
  backend: litellm
  dimension: 1536                  # must match persistence.vector.chromadb.dimension
  batch_size: 32
  litellm:
    model: openai/text-embedding-3-small
    api_key_env: OPENAI_API_KEY

retrieval:
  vector:
    top_k: 30
  merge:
    rrf_k: 60
    sibling_expansion_enabled: true
    crossref_expansion_enabled: true
  rerank:
    enabled: false                 # flip on when you trust your LLM budget
    backend: litellm
    model: openai/gpt-4o-mini
    top_k: 10

answering:
  max_chunks: 10
  generator:
    backend: litellm
    model: openai/gpt-4o-mini
    temperature: 0.1
    max_tokens: 2048
    api_key_env: OPENAI_API_KEY
    chunk_chars: 1500
    max_context_chars: 20000
    refuse_when_unknown: true
